name: Deploy WebAssembly demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the token the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The game itself. Its committed go.mod requires the published go-sdl3, so
      # native `go build` / `go get` work unchanged for everyone.
      - name: Checkout game
        uses: actions/checkout@v4
        with:
          path: soccer-go

      # The browser build needs SDL3-compiled-to-Emscripten plus a few js/wasm
      # bindings that aren't in upstream go-sdl3 yet. The fork supplies both the
      # bindings and the `wasmsdl` bundler (which ships sdl.js + sdl.wasm).
      - name: Checkout go-sdl3-wasm fork
        uses: actions/checkout@v4
        with:
          repository: chrplr/go-sdl3-wasm
          ref: wasm-render-fixes
          path: go-sdl3-wasm

      - uses: actions/setup-go@v5
        with:
          go-version-file: soccer-go/go.mod
          cache-dependency-path: soccer-go/go.sum

      # Redirect go-sdl3 to the sibling fork for this build only. The replace is
      # never committed, so it can't affect native consumers of the module.
      - name: Point go-sdl3 at the fork (js/wasm bindings)
        working-directory: soccer-go
        run: go mod edit -replace github.com/Zyko0/go-sdl3=../go-sdl3-wasm

      # wasmsdl compiles the game to wasm (assets are embedded, nothing to copy)
      # and assembles index.html + wasm_exec.js + main.wasm + sdl.js + sdl.wasm.
      - name: Build the WebAssembly bundle
        working-directory: go-sdl3-wasm
        run: |
          go run ./cmd/wasmsdl build \
            -out "$GITHUB_WORKSPACE/dist" \
            -html "$GITHUB_WORKSPACE/soccer-go/web/index.html" \
            "$GITHUB_WORKSPACE/soccer-go"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
